# Render Blueprint — auto-configures the FastAPI service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: insideedge-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -e ".[api,dbt]" &&
      python -m src.ingestion.run --profile minimal &&
      cd src/dbt && dbt seed --profiles-dir . && dbt run --profiles-dir .
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

version: 2

models:
  - name: dim_matches
    description: "Match dimension — one row per match with derived analytical columns, enriched with ESPN data (captains, home team, timing, venue details)."
    columns:
      - name: match_id
        description: "Unique Cricsheet match identifier"
        tests:
          - unique
          - not_null
      - name: season
        description: "Normalized season string (calendar year)"
      - name: match_date
        description: "Date the match was played"
      - name: city
        description: "City where the match took place"
      - name: venue
        description: "Venue name"
      - name: team1
        description: "First team listed"
      - name: team2
        description: "Second team listed"
      - name: toss_winner
        description: "Team that won the toss"
      - name: toss_decision
        description: "Toss decision: 'bat' or 'field'"
      - name: outcome_winner
        description: "Winning team name (NULL if no winner)"
      - name: outcome_by_runs
        description: "Victory margin in runs (NULL if won by wickets)"
      - name: outcome_by_wickets
        description: "Victory margin in wickets (NULL if won by runs)"
      - name: outcome_method
        description: "Special method used (e.g. 'D/L' for Duckworth-Lewis)"
      - name: outcome_result
        description: "Non-win result: 'draw', 'tie', or 'no result'"
      - name: outcome_eliminator
        description: "Super over winner in a tied match"
      - name: player_of_match
        description: "Player of the match"
      - name: event_name
        description: "Tournament or series name"
      - name: event_match_number
        description: "Match number within the event"
      - name: event_stage
        description: "Event stage (e.g. 'Final', 'Qualifier 1')"
      - name: match_type
        description: "Match format: T20, ODI, Test, IT20, ODM, MDM"
      - name: gender
        description: "Player gender: 'male' or 'female'"
      - name: max_overs
        description: "Maximum overs per innings for this format"
      - name: match_result_type
        description: "Derived enum classifying the outcome: normal_win, dls_win, tie_super_over, no_result, or unknown"
      - name: winning_margin
        description: "Derived human-readable margin (e.g. '5 runs', '3 wickets', 'Team won via super over')"
      - name: team1_captain
        description: "Team 1 captain name (from ESPN enrichment, NULL if not yet scraped)"
      - name: team1_keeper
        description: "Team 1 wicketkeeper name (from ESPN enrichment)"
      - name: team2_captain
        description: "Team 2 captain name (from ESPN enrichment)"
      - name: team2_keeper
        description: "Team 2 wicketkeeper name (from ESPN enrichment)"
      - name: team1_is_home
        description: "Whether team1 is the home team at this venue (from ESPN)"
      - name: team2_is_home
        description: "Whether team2 is the home team at this venue (from ESPN)"
      - name: floodlit
        description: "Lighting condition: day, night, daynight (from ESPN enrichment)"
      - name: start_time
        description: "Actual match start time as UTC timestamp (from ESPN)"
      - name: end_time
        description: "Actual match end time as UTC timestamp (from ESPN)"
      - name: hours_info
        description: "Session timing breakdown in local time (from ESPN)"
      - name: venue_timezone
        description: "IANA timezone of the venue, e.g. 'Asia/Kolkata' (from ESPN)"
      - name: espn_match_id
        description: "ESPN's unique match object ID"
      - name: espn_ground_id
        description: "ESPN's unique ground/venue ID"
      - name: ground_capacity
        description: "Stadium capacity as string (from ESPN)"
      - name: international_class_id
        description: "ESPN international classification ID (null for franchise cricket)"
      - name: sub_class_id
        description: "ESPN sub-classification (warm-ups, qualifiers, etc.)"

  - name: dim_players
    description: "Player dimension — one row per player, enriched with ESPN biographical data (DOB, batting/bowling styles, playing roles)."
    columns:
      - name: player_id
        description: "8-char hex Cricsheet identifier — stable unique ID across all matches"
        tests:
          - unique
          - not_null
      - name: player_name
        description: "Short display name as used in match data (e.g. 'V Kohli')"
        tests:
          - not_null
      - name: unique_name
        description: "Disambiguated full name from people.csv"
      - name: key_cricinfo
        description: "ESPNcricinfo player ID (string from people.csv)"
      - name: key_cricbuzz
        description: "Cricbuzz player ID"
      - name: key_bcci
        description: "BCCI player ID"
      - name: espn_player_id
        description: "ESPN's numeric player object ID (from ESPN enrichment)"
      - name: date_of_birth
        description: "Player date of birth (from ESPN enrichment)"
      - name: batting_styles
        description: "JSON array of batting style codes, e.g. ['rhb'] for right-hand bat (from ESPN)"
      - name: bowling_styles
        description: "JSON array of bowling style codes, e.g. ['sla'] for slow left-arm orthodox (from ESPN)"
      - name: long_batting_styles
        description: "JSON array of human-readable batting styles, e.g. ['right-hand bat'] (from ESPN)"
      - name: long_bowling_styles
        description: "JSON array of human-readable bowling styles (from ESPN)"
      - name: playing_roles
        description: "JSON array of playing roles, e.g. ['batter'], ['bowling allrounder'] (from ESPN)"
      - name: country_team_id
        description: "ESPN ID of player's national team (from ESPN)"
      - name: is_overseas
        description: "Whether the player is an overseas (non-domestic) player (from ESPN, based on most recent match)"

  - name: dim_teams
    description: "Team dimension — one row per team name with franchise mapping, match date range, and brand colors."
    columns:
      - name: team_name
        description: "Team name as it appeared in match data (historical names preserved)"
        tests:
          - unique
          - not_null
      - name: current_franchise_name
        description: "Current franchise name from seed CSV (NULL if defunct, same as team_name if never renamed)"
      - name: first_match_date
        description: "Date of the team's first match in the dataset"
      - name: last_match_date
        description: "Date of the team's most recent match in the dataset"
      - name: total_matches
        description: "Total number of matches played by this team"
      - name: team_abbreviation
        description: "Short abbreviation (e.g. CSK, MI, RCB) from ESPN enrichment"
      - name: is_country
        description: "Whether this is a national team (true) or franchise/club (false)"
      - name: primary_color
        description: "Primary brand color hex from curated seed CSV (falls back to ESPN color if seed missing)"
      - name: brand_color_alt
        description: "Alternate brand color hex — used when logo clashes with primary color background"
      - name: logo_url
        description: "ESPN CDN path for team logo image"

  - name: dim_venues
    description: "Venue dimension — one row per unique venue+city combination, enriched with ESPN ground data."
    tests:
      - unique:
          column_name: "venue || '|' || coalesce(city, '')"
    columns:
      - name: venue
        description: "Venue name (e.g. 'M Chinnaswamy Stadium')"
        tests:
          - not_null
      - name: city
        description: "City where the venue is located"
      - name: canonical_venue
        description: "Normalized venue name — resolves aliases (e.g. 'Feroz Shah Kotla' → 'Arun Jaitley Stadium') via venue_name_mappings seed. Falls back to original venue if no mapping exists."
      - name: canonical_city
        description: "Normalized city name — resolves spelling variations (e.g. 'Bangalore' → 'Bengaluru') via venue_name_mappings seed. Falls back to original city if no mapping exists."
      - name: total_matches
        description: "Number of matches played at this venue"
      - name: first_match_date
        description: "Date of the first match at this venue"
      - name: last_match_date
        description: "Date of the most recent match at this venue"
      - name: espn_ground_id
        description: "ESPN's unique ground/venue ID (from ESPN enrichment)"
      - name: ground_capacity
        description: "Stadium capacity as string (from ESPN enrichment)"
      - name: venue_timezone
        description: "IANA timezone of the venue, e.g. 'Asia/Kolkata' (from ESPN enrichment)"

  - name: fact_deliveries
    description: "Core fact table — one row per ball bowled (excluding super overs). Incremental materialization appends new matches only."
    columns:
      - name: match_id
        description: "Foreign key to dim_matches"
        tests:
          - not_null
      - name: season
        description: "Normalized season from the match"
      - name: match_date
        description: "Date of the match"
      - name: innings
        description: "Innings number (1 or 2 for regular play)"
      - name: batting_team
        description: "Name of the batting team"
      - name: is_super_over
        description: "Always false in this table (super overs filtered out)"
      - name: over_num
        description: "0-indexed over number"
      - name: ball_num
        description: "0-indexed ball number within the over"
      - name: batter
        description: "Name of the batter facing the delivery"
        tests:
          - not_null
      - name: bowler
        description: "Name of the bowler"
      - name: non_striker
        description: "Name of the non-striker"
      - name: batter_runs
        description: "Runs scored by the batter"
      - name: extras_runs
        description: "Total extras on this delivery"
      - name: total_runs
        description: "Total runs (batter + extras)"
      - name: extras_wides
        description: "Wide runs (0 if not a wide)"
      - name: extras_noballs
        description: "No-ball runs (0 if not a no-ball)"
      - name: extras_byes
        description: "Bye runs (0 if no byes)"
      - name: extras_legbyes
        description: "Leg-bye runs (0 if no leg-byes)"
      - name: extras_penalty
        description: "Penalty runs (0 if no penalty)"
      - name: is_legal_delivery
        description: "True if not a wide or no-ball"
      - name: is_wicket
        description: "True if a wicket fell"
      - name: wicket_player_out
        description: "Dismissed player name (NULL if no wicket)"
      - name: wicket_kind
        description: "Dismissal type (bowled, caught, lbw, run out, etc.)"
      - name: wicket_fielder1
        description: "Primary fielder in dismissal"
      - name: wicket_fielder2
        description: "Secondary fielder in dismissal"
      - name: is_four
        description: "True if batter scored 4"
      - name: is_six
        description: "True if batter scored 6"
      - name: is_dot_ball
        description: "True if legal delivery with 0 total runs"
      - name: phase
        description: "Derived match phase based on format. T20: powerplay (0-5), middle (6-14), death (15-19). ODI: powerplay (0-9), middle (10-39), death (40-49). NULL for Tests and unknown formats."

  - name: fact_batting_innings
    description: "Batting aggregates — one row per batter per match innings (excluding super overs)."
    tests:
      - unique:
          column_name: "match_id || '|' || innings || '|' || batter"
    columns:
      - name: match_id
        description: "Foreign key to dim_matches"
        tests:
          - not_null
      - name: season
        description: "Normalized season"
      - name: match_date
        description: "Date of the match"
      - name: innings
        description: "Innings number"
        tests:
          - not_null
      - name: batting_team
        description: "Name of the batting team"
      - name: batter
        description: "Name of the batter"
        tests:
          - not_null
      - name: balls_faced
        description: "Number of legal deliveries faced (excludes wides and no-balls)"
        tests:
          - not_null
      - name: runs_scored
        description: "Total runs scored by the batter"
        tests:
          - not_null
      - name: fours
        description: "Number of 4s hit"
      - name: sixes
        description: "Number of 6s hit"
      - name: dot_balls
        description: "Number of dot balls faced (legal delivery, 0 total runs)"
      - name: strike_rate
        description: "Batting strike rate: (runs / balls_faced) * 100, rounded to 2 decimal places. 0 if no balls faced."
        tests:
          - not_null
      - name: is_out
        description: "True if the batter was dismissed in this innings"
      - name: dismissal_kind
        description: "How the batter was dismissed (bowled, caught, lbw, etc.). NULL if not out."
      - name: dismissed_by
        description: "Name of the bowler who took the wicket. NULL if not out or run out."

  - name: fact_bowling_innings
    description: "Bowling aggregates — one row per bowler per match innings (excluding super overs)."
    tests:
      - unique:
          column_name: "match_id || '|' || innings || '|' || bowler"
    columns:
      - name: match_id
        description: "Foreign key to dim_matches"
        tests:
          - not_null
      - name: season
        description: "Normalized season"
      - name: match_date
        description: "Date of the match"
      - name: innings
        description: "Innings number"
        tests:
          - not_null
      - name: batting_team
        description: "Name of the team the bowler was bowling against"
      - name: bowler
        description: "Name of the bowler"
        tests:
          - not_null
      - name: legal_balls
        description: "Number of legal deliveries bowled (excludes wides and no-balls)"
        tests:
          - not_null
      - name: overs_bowled
        description: "Overs bowled in cricket notation (e.g. 4.0, 3.2 = 3 overs and 2 balls)"
      - name: runs_conceded
        description: "Runs charged to the bowler: batter_runs + wides + noballs. Excludes byes, legbyes, and penalties (not the bowler's fault)."
        tests:
          - not_null
      - name: wickets
        description: "Wickets taken (excludes run outs, retired hurt/out, obstructing the field)"
        tests:
          - not_null
      - name: dot_balls
        description: "Number of dot balls bowled"
      - name: wides
        description: "Total wide runs conceded"
      - name: noballs
        description: "Total no-ball runs conceded"
      - name: fours_conceded
        description: "Number of 4s hit off this bowler"
      - name: sixes_conceded
        description: "Number of 6s hit off this bowler"
      - name: economy_rate
        description: "Economy rate: bowler's runs conceded per over (excludes byes, legbyes, penalties). Calculated as (batter_runs + wides + noballs) * 6 / legal_balls, rounded to 2 decimal places. 0 if no balls bowled."
        tests:
          - not_null

  - name: fact_match_summary
    description: "Team-level match innings aggregates — one row per team per innings (excluding super overs)."
    tests:
      - unique:
          column_name: "match_id || '|' || innings || '|' || batting_team"
    columns:
      - name: match_id
        description: "Foreign key to dim_matches"
        tests:
          - not_null
      - name: season
        description: "Normalized season"
      - name: match_date
        description: "Date of the match"
      - name: innings
        description: "Innings number"
        tests:
          - not_null
      - name: batting_team
        description: "Name of the batting team"
        tests:
          - not_null
      - name: total_runs
        description: "Total runs scored in the innings"
        tests:
          - not_null
      - name: total_wickets
        description: "Total wickets fallen in the innings"
        tests:
          - not_null
      - name: legal_balls
        description: "Total legal deliveries bowled in the innings"
      - name: total_extras
        description: "Total extras conceded in the innings"
      - name: total_fours
        description: "Total 4s hit in the innings"
      - name: total_sixes
        description: "Total 6s hit in the innings"
      - name: total_dot_balls
        description: "Total dot balls in the innings"
      - name: run_rate
        description: "Run rate: runs per over (runs * 6 / legal_balls), rounded to 2 decimal places"
        tests:
          - not_null
      - name: overs_played
        description: "Number of overs completed (max over_num + 1)"

  # ==========================================================================
  # Shape 2 — Entity Snapshots (ADR-006 / ADR-007)
  # ==========================================================================
  - name: snapshot_player_career
    description: >
      One row per (player, match). Point-in-time player state: career totals
      and rolling-form metrics as-of BEFORE this match. Single source of
      truth for as-of state (ADR-007). All *_before columns use safe
      point-in-time window macros; all rolling_N_* columns exclude the
      current row.
    columns:
      - name: player_name
        description: "Player name (natural key, matches stg_deliveries.batter/bowler)"
        tests:
          - not_null
      - name: as_of_match_id
        description: "Reference match for this snapshot row (Cricsheet match_id)"
        tests:
          - not_null
          - relationships:
              to: ref('stg_matches')
              field: match_id
      - name: as_of_date
        description: "Date of the reference match"
        tests:
          - not_null
      - name: season
        description: "Season of the reference match (calendar-year derivation, format-agnostic)"
      - name: did_bat
        description: "1 if the player batted in this match, 0 otherwise"
      - name: did_bowl
        description: "1 if the player bowled in this match, 0 otherwise"
      - name: career_runs_before
        description: "Cumulative runs scored in all matches strictly BEFORE this match"
      - name: career_balls_faced_before
        description: "Cumulative legal balls faced before this match"
      - name: career_innings_batted_before
        description: "Count of matches batted before this match"
      - name: career_wickets_before
        description: "Cumulative wickets taken before this match (excludes run-outs, retired, obstructing)"
      - name: career_legal_balls_bowled_before
        description: "Cumulative legal balls bowled before this match"
      - name: career_runs_conceded_before
        description: "Cumulative runs conceded before this match (batter_runs + wides + noballs, byes/legbyes excluded)"
      - name: rolling_10_runs
        description: "Runs in last 10 innings prior to this match (NULL if fewer than 1 prior match)"
      - name: rolling_10_wickets
        description: "Wickets in last 10 innings prior to this match"
    tests:
      - unique:
          column_name: "player_name || '|' || as_of_match_id"

  # ==========================================================================
  # Shape 1 — OBT (Event Spine) (ADR-006)
  # ==========================================================================
  - name: fact_deliveries_enriched
    description: >
      OBT / Event Spine. One row per delivery (super overs excluded) with 205
      columns of pre-joined context: match, venue, ESPN enrichment, umpires,
      DRS reviews, impact player replacements, ESPN spatial/shot data (wagon
      wheel, pitch map, shot type, shot control), ball commentary (text,
      dismissal descriptions, fielding events — dropped catches, run-out
      chances, stumping chances), player bio (handedness, age, overseas flag,
      role, batting position), MVP impact scores, weather at match start,
      in-match running state (*_at_ball), batter/bowler career+rolling columns
      from snapshot_player_career, chase context (target, required run rate,
      balls remaining), and phase classification. Incremental by match_id.
      See docs/obt-field-catalog.md for the full field inventory.
    columns:
      - name: match_id
        description: "Cricsheet match identifier"
        tests:
          - not_null
      - name: innings
        description: "Innings number (1-based)"
        tests:
          - not_null
      - name: over_num
        description: "0-indexed over number"
        tests:
          - not_null
      - name: ball_num
        description: "1-indexed ball number within the over"
        tests:
          - not_null
      - name: batter
        description: "Batter's name"
        tests:
          - not_null
      - name: bowler
        description: "Bowler's name"
        tests:
          - not_null
      - name: phase
        description: "Match phase (powerplay/middle/death) — format-agnostic, NULL for Tests"
      - name: team_score_at_ball
        description: "Cumulative team runs at the end of this ball"
      - name: team_wickets_at_ball
        description: "Cumulative team wickets at the end of this ball"
      - name: batter_score_at_ball
        description: "Batter's runs in this innings up to and including this ball"
      - name: batter_career_runs_before
        description: "Batter's career runs BEFORE this match (from snapshot — no leakage)"
      - name: bowler_career_wickets_before
        description: "Bowler's career wickets BEFORE this match"
      - name: wagon_x
        description: "ESPN wagon wheel X coordinate"
      - name: wagon_y
        description: "ESPN wagon wheel Y coordinate"
      - name: pitch_line
        description: "ESPN delivery line (ON_THE_STUMPS, OUTSIDE_OFFSTUMP, etc.)"
      - name: pitch_length
        description: "ESPN delivery length (GOOD_LENGTH, YORKER, SHORT, etc.)"
      - name: shot_type
        description: "ESPN shot type (COVER_DRIVE, CUT_SHOT, DEFENDED, etc.)"
      - name: shot_control
        description: "ESPN shot control rating (1=controlled, 2=uncontrolled)"
      - name: commentary_text
        description: "ESPN ball-by-ball commentary text"
      - name: had_dropped_catch
        description: "True if a catch was dropped on this ball"
      - name: batter_batting_position
        description: "Batter's batting order position (1-11) from ESPN"
      - name: batter_age_at_match
        description: "Batter's age in years at the time of this match"
      - name: required_run_rate
        description: "Required run rate at this ball (2nd innings only)"
      - name: ball_timestamp
        description: "ISO-8601 datetime of this delivery (~37% coverage)"
    tests:
      - unique:
          column_name: "match_id || '|' || innings || '|' || over_num || '|' || ball_num"

version: 2

models:
  - name: stg_matches
    description: "Staged match metadata from Cricsheet JSON files. Cleaned types, normalized season format, one row per match."
    columns:
      - name: match_id
        description: "Unique Cricsheet match identifier (numeric, from JSON filename)"
        tests:
          - unique
          - not_null
      - name: data_version
        description: "Cricsheet data format version (e.g. '1.0.0', '1.1.0')"
      - name: season_raw
        description: "Original season string from Cricsheet (e.g. '2007/08', '2020/21', '2025'). Preserved for reference and debugging."
      - name: season
        description: "Derived season: calendar year extracted from match_date. Format-agnostic — works across all leagues without hardcoded special cases."
        tests:
          - not_null
      - name: match_date
        description: "Date the match was played (first day for multi-day matches), cast from Cricsheet dates array"
        tests:
          - not_null
      - name: city
        description: "City where the match took place (optional in Cricsheet data)"
      - name: venue
        description: "Venue name where the match was played (e.g. 'M Chinnaswamy Stadium')"
      - name: team1
        description: "Name of the first team listed in the Cricsheet teams array"
      - name: team2
        description: "Name of the second team listed in the Cricsheet teams array"
      - name: toss_winner
        description: "Name of the team that won the toss"
      - name: toss_decision
        description: "Toss winner's decision: 'bat' or 'field'"
      - name: outcome_winner
        description: "Name of the winning team, NULL if draw/tie/no result"
      - name: outcome_by_runs
        description: "Margin of victory in runs (NULL if won by wickets or no winner)"
      - name: outcome_by_wickets
        description: "Margin of victory in wickets (NULL if won by runs or no winner)"
      - name: outcome_method
        description: "Method used to determine winner if curtailed (e.g. 'D/L' for Duckworth-Lewis)"
      - name: outcome_result
        description: "Result when no team won: 'draw', 'tie', or 'no result'"
      - name: outcome_eliminator
        description: "Team that won the super over in a tied match"
      - name: player_of_match
        description: "Name of the player adjudged player of the match"
      - name: event_name
        description: "Name of the tournament or series (e.g. 'Indian Premier League')"
      - name: event_match_number
        description: "Match number within the event/series"
      - name: event_stage
        description: "Stage of the event (e.g. 'Final', 'Qualifier 1', 'Super 10')"
      - name: match_type
        description: "Type of match: T20, ODI, Test, IT20, ODM, or MDM"
      - name: gender
        description: "Gender of the players: 'male' or 'female'"
      - name: max_overs
        description: "Maximum overs per innings for this match type (e.g. 20 for T20, 50 for ODI)"
      - name: balls_per_over
        description: "Number of balls per over, generally 6"
      - name: players_team1_json
        description: "JSON array of player names in team1's playing XI"
      - name: players_team2_json
        description: "JSON array of player names in team2's playing XI"
      - name: registry_json
        description: "JSON object mapping player names to their unique Cricsheet identifiers (8-char hex)"
      - name: _loaded_at
        description: "Timestamp when this row was loaded into the silver layer"

  - name: stg_deliveries
    description: "Staged ball-by-ball data from Cricsheet JSON files. One row per delivery with computed flags and validation columns."
    columns:
      - name: match_id
        description: "Foreign key to stg_matches — identifies which match this delivery belongs to"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_matches')
                field: match_id
      - name: innings
        description: "Innings number (1, 2, or higher for super overs)"
      - name: batting_team
        description: "Name of the team batting in this innings"
      - name: is_super_over
        description: "True if this delivery is part of a super over"
      - name: over_num
        description: "0-indexed over number within the innings (0 = first over)"
      - name: ball_num
        description: "0-indexed ball number within the over"
      - name: batter
        description: "Name of the batter who faced this delivery"
        tests:
          - not_null
      - name: bowler
        description: "Name of the bowler who bowled this delivery"
        tests:
          - not_null
      - name: non_striker
        description: "Name of the non-striker during this delivery"
      - name: batter_runs
        description: "Runs scored by the batter off this ball (0 if none)"
      - name: extras_runs
        description: "Total extra runs conceded on this delivery (wides + noballs + byes + legbyes + penalty)"
      - name: total_runs
        description: "Total runs from this delivery (batter_runs + extras_runs)"
      - name: extras_wides
        description: "Wide runs on this delivery (0 if not a wide)"
      - name: extras_noballs
        description: "No-ball runs on this delivery (0 if not a no-ball)"
      - name: extras_byes
        description: "Bye runs on this delivery (0 if no byes)"
      - name: extras_legbyes
        description: "Leg-bye runs on this delivery (0 if no leg-byes)"
      - name: extras_penalty
        description: "Penalty runs on this delivery (0 if no penalty)"
      - name: is_legal_delivery
        description: "True if the delivery is legal (not a wide or no-ball). Used for balls-faced and economy calculations."
      - name: is_wicket
        description: "True if a wicket fell on this delivery"
      - name: wicket_player_out
        description: "Name of the dismissed player (NULL if no wicket)"
      - name: wicket_kind
        description: "Dismissal type: bowled, caught, lbw, run out, stumped, caught and bowled, hit wicket, retired hurt, retired out, obstructing the field"
      - name: wicket_fielder1
        description: "Name of the primary fielder involved in the dismissal (NULL if not applicable)"
      - name: wicket_fielder2
        description: "Name of the secondary fielder involved (e.g. second fielder in a run out relay)"
      - name: is_four
        description: "True if the batter scored exactly 4 runs off this ball"
      - name: is_six
        description: "True if the batter scored exactly 6 runs off this ball"
      - name: is_dot_ball
        description: "True if this is a legal delivery with 0 total runs scored"
      - name: _is_valid_extras
        description: "Validation flag: true if extras component columns sum to extras_runs"
      - name: _is_valid_total
        description: "Validation flag: true if total_runs = batter_runs + extras_runs"
      - name: _loaded_at
        description: "Timestamp when this row was loaded into the silver layer"

  - name: stg_people
    description: "Staged player/official registry from Cricsheet people.csv. One row per person with cross-reference IDs."
    columns:
      - name: player_id
        description: "8-char hex Cricsheet identifier — stable across all matches regardless of name variations"
        tests:
          - unique
          - not_null
      - name: player_name
        description: "Short display name (e.g. 'V Kohli')"
        tests:
          - not_null
      - name: unique_name
        description: "Disambiguated full name for players who share short names"
      - name: key_cricinfo
        description: "ESPNcricinfo player ID for cross-referencing"
      - name: key_cricbuzz
        description: "Cricbuzz player ID for cross-referencing"
      - name: key_bcci
        description: "BCCI player ID for cross-referencing"
      - name: _loaded_at
        description: "Timestamp when this row was loaded into the silver layer"

  - name: stg_espn_matches
    description: "Staged ESPN match enrichment data. One row per match with venue, timing, captains, home team, and classification fields."
    columns:
      - name: match_id
        description: "Cricsheet match ID — join key to stg_matches"
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_matches')
              field: match_id
      - name: espn_match_id
        description: "ESPN's unique match object ID"
      - name: start_time
        description: "Actual match start time (first ball) as UTC timestamp"
      - name: end_time
        description: "Actual match end time (last ball / result) as UTC timestamp"
      - name: venue_timezone
        description: "IANA timezone of the venue (e.g. 'Asia/Kolkata')"
      - name: team1_is_home
        description: "Whether team1 is the home team at this venue"
      - name: team2_is_home
        description: "Whether team2 is the home team at this venue"

  - name: stg_espn_players
    description: "Staged ESPN player biographical data. One row per player per match appearance."
    columns:
      - name: espn_player_id
        description: "ESPN's unique player object ID"
        tests:
          - not_null
      - name: date_of_birth
        description: "Player date of birth (derived from year/month/day components)"
      - name: is_overseas
        description: "Whether the player is an overseas (non-domestic) player in this match"
      - name: playing_roles
        description: "JSON array of playing roles (e.g. 'batter', 'bowler', 'allrounder')"

  - name: stg_espn_ball_data
    description: "Staged ESPN per-ball spatial and prediction data. One row per ball bowled."
    columns:
      - name: espn_ball_id
        description: "ESPN's unique ball ID"
        tests:
          - unique
          - not_null
      - name: wagon_x
        description: "Wagon wheel X coordinate (0-300, 150=center)"
      - name: wagon_y
        description: "Wagon wheel Y coordinate (0-300, 0=bowler's end)"
      - name: wagon_zone
        description: "Wagon wheel zone (0-8, 0=dot ball/no shot)"
      - name: pitch_line
        description: "Delivery line: DOWN_LEG, ON_THE_STUMPS, OUTSIDE_OFFSTUMP, WIDE_DOWN_LEG, WIDE_OUTSIDE_OFFSTUMP"
      - name: pitch_length
        description: "Delivery length: FULL, FULL_TOSS, GOOD_LENGTH, SHORT, SHORT_OF_A_GOOD_LENGTH, YORKER"
      - name: shot_type
        description: "Type of shot played (COVER_DRIVE, CUT_SHOT, DAB, DEFENDED, FLICK, etc.)"
      - name: shot_control
        description: "Shot control rating: 1=controlled, 2=uncontrolled"
      - name: win_probability
        description: "Win probability for batting team after this ball (0-100)"

  - name: stg_espn_innings
    description: "Staged ESPN innings-level enrichment data. One row per innings per match."
    columns:
      - name: espn_match_id
        description: "ESPN match ID — join key to stg_espn_matches"
        tests:
          - not_null
      - name: inning_number
        description: "Innings number (1 or 2)"
        tests:
          - not_null
      - name: runs_saved
        description: "Runs saved by fielding in this innings (may be null)"
      - name: catches_dropped
        description: "Dropped catches in this innings (may be null)"
      - name: partnerships_json
        description: "JSON array of partnership details (player runs/balls, total, out player)"

  - name: stg_venue_coordinates
    description: "Staged venue coordinates from geocoding enrichment. One row per (venue, city) with lat/lng. Only includes successfully geocoded venues."
    columns:
      - name: venue
        description: "Venue name as it appears in match data"
        tests:
          - not_null
      - name: city
        description: "City where the venue is located"
      - name: latitude
        description: "Geocoded latitude"
      - name: longitude
        description: "Geocoded longitude"
      - name: formatted_address
        description: "Full formatted address from Google Maps Geocoding API"
      - name: place_id
        description: "Google Maps place ID for the venue"
      - name: geocode_status
        description: "Geocoding result status (always 'ok' in this table — failed geocodes filtered out)"
      - name: _loaded_at
        description: "Timestamp when this row was loaded into the silver layer"

  # ==========================================================================
  # New silver models (Phase B — OBT expansion)
  # ==========================================================================

  - name: stg_espn_ball_commentary
    description: "Staged ESPN per-ball commentary. One row per ball with text, dismissal descriptions, fielding events (dropped catches, run-out chances, stumping chances, DRS reviews), smart stats, and over summaries."
    columns:
      - name: espn_ball_id
        description: "ESPN ball ID — join key to stg_espn_ball_data"
        tests:
          - not_null
      - name: match_id
        description: "Cricsheet match ID"
      - name: ball_title
        description: "Ball title (e.g. 'Bumrah to Kohli')"
      - name: commentary_text
        description: "Main commentary sentence for this ball"
      - name: pre_text
        description: "Reader/editorial text before the ball"
      - name: post_text
        description: "Reader/editorial text after the ball"
      - name: batsman_stat_text
        description: "Per-ball batter stat summary text"
      - name: bowler_stat_text
        description: "Per-ball bowler stat summary text"
      - name: smart_stat_raw_json
        description: "Full smart_stats JSON blob — ESPN's contextual historical stats for this ball (0.78% coverage)"
      - name: espn_dismissal_text_short
        description: "Short dismissal text (e.g. 'caught')"
      - name: espn_dismissal_text_long
        description: "Long dismissal text (e.g. 'c Kohli b Bumrah')"
      - name: espn_dismissal_text_commentary
        description: "Full dismissal commentary sentence"
      - name: espn_dismissal_fielder_text
        description: "Fielder portion of dismissal (e.g. 'c Kohli')"
      - name: espn_dismissal_bowler_text
        description: "Bowler portion of dismissal (e.g. 'b Bumrah')"
      - name: had_dropped_catch
        description: "True if a catch was dropped on this ball"
      - name: dropped_catch_fielders
        description: "Comma-separated fielder names who dropped the catch"
      - name: had_drs_review
        description: "True if a DRS review occurred on this ball"
      - name: drs_review_successful
        description: "True if the DRS review was successful (overturned)"
      - name: had_run_out_chance
        description: "True if there was a run-out chance on this ball"
      - name: run_out_chance_fielders
        description: "Comma-separated fielder names involved in the run-out chance"
      - name: had_stumping_chance
        description: "True if there was a stumping chance on this ball"
      - name: stumping_chance_fielder
        description: "Fielder (keeper) involved in the stumping chance"
      - name: had_player_replacement
        description: "True if an impact player replacement happened on this ball"
      - name: is_maiden_over
        description: "True if this over was a maiden (last ball of over only)"
      - name: over_runs_total
        description: "Total runs in this over (last ball of over only)"
      - name: over_wickets_total
        description: "Total wickets in this over (last ball of over only)"
      - name: is_complete_over
        description: "True if this over was completed (last ball of over only)"

  - name: stg_espn_batting_innings
    description: "Staged ESPN batting innings details. One row per (match, innings, player). Extracted from batsmen_details_json. Provides batting position (1-11) and dismissal text."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: inning_number
        description: "Innings number"
        tests:
          - not_null
      - name: espn_player_id
        description: "ESPN player ID"
        tests:
          - not_null
      - name: player_name
        description: "Player name as listed by ESPN"
      - name: batted_type
        description: "'yes' if batted, 'no' or null if did not bat"
      - name: minutes
        description: "Minutes at crease (null for older matches)"
      - name: batting_position
        description: "Batting order position (1 = opener, 11 = last)"
      - name: dismissal_text_short
        description: "Short dismissal text (e.g. 'caught', 'not out')"

  - name: stg_espn_team_players
    description: "Staged ESPN team player roster per match. One row per (match, team, player). Provides per-player per-match role (captain, keeper, player)."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: match_id
        description: "Cricsheet match ID"
      - name: espn_team_id
        description: "ESPN team ID"
      - name: espn_player_id
        description: "ESPN player ID"
        tests:
          - not_null
      - name: player_name
        description: "Player short name"
      - name: role_code
        description: "Role code: C (captain), WK (keeper), P (player)"
      - name: role
        description: "Role text: captain, wicketkeeper, player"
      - name: is_captain
        description: "True if this player is captain for this match"
      - name: is_keeper
        description: "True if this player is wicketkeeper for this match"

  - name: stg_espn_debut_players
    description: "Staged ESPN debut players per match. One row per (match, player) for players making their debut."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: match_id
        description: "Cricsheet match ID"
      - name: espn_player_id
        description: "ESPN player ID of the debutant"
        tests:
          - not_null
      - name: player_name
        description: "Player short name"
      - name: team_name
        description: "Team the player debuted for"

  - name: stg_espn_drs_reviews
    description: "Staged ESPN DRS reviews per innings. One row per review event. Extracted from drs_reviews_json."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: inning_number
        description: "Innings number"
        tests:
          - not_null
      - name: review_number
        description: "Sequential review number within the innings"
      - name: review_side
        description: "Which side called the review: 'batting' or 'bowling'"
      - name: is_umpire_call
        description: "True if the DRS result was 'umpire's call'"
      - name: remaining_count
        description: "Number of DRS reviews remaining for the reviewing team after this review"
      - name: original_decision
        description: "Umpire's original decision: 'out' or 'notout'"
      - name: drs_decision
        description: "DRS final decision: 'out' or 'notout'"
      - name: overs_actual
        description: "Over at which the review occurred (decimal, e.g. 13.1)"

  - name: stg_espn_replacements
    description: "Staged ESPN replacement (impact) players per match. One row per replacement event. Extracted from replacement_players_json."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: match_id
        description: "Cricsheet match ID"
      - name: player_in_espn_id
        description: "ESPN player ID of the player coming in"
      - name: player_in_name
        description: "Name of the player coming in"
      - name: player_out_espn_id
        description: "ESPN player ID of the player going out"
      - name: player_out_name
        description: "Name of the player going out"
      - name: team_name
        description: "Team making the replacement"
      - name: inning_number
        description: "Innings in which the replacement occurred"
      - name: over_decimal
        description: "Over at which the replacement occurred (decimal, e.g. 18.6)"
      - name: replacement_type_code
        description: "ESPN replacement type code (8 = impact player)"

  - name: stg_espn_partnerships
    description: "Staged ESPN partnerships per innings. One row per partnership. NOT joined to OBT (wrong grain). Extracted from partnerships_json."
    columns:
      - name: espn_match_id
        description: "ESPN match ID"
        tests:
          - not_null
      - name: inning_number
        description: "Innings number"
        tests:
          - not_null
      - name: partnership_number
        description: "Sequential partnership number within the innings (1 = opening)"
      - name: player1_espn_id
        description: "ESPN player ID of first partner"
      - name: player1_name
        description: "Name of first partner"
      - name: player1_runs
        description: "Runs scored by first partner in this partnership"
      - name: player1_balls
        description: "Balls faced by first partner"
      - name: player2_espn_id
        description: "ESPN player ID of second partner"
      - name: player2_name
        description: "Name of second partner"
      - name: player2_runs
        description: "Runs scored by second partner"
      - name: player2_balls
        description: "Balls faced by second partner"
      - name: total_runs
        description: "Total partnership runs"
      - name: total_balls
        description: "Total partnership balls"
      - name: out_player_espn_id
        description: "ESPN player ID of the player dismissed to end this partnership (null if not out)"

  - name: stg_espn_series
    description: "Staged ESPN series reference data. One row per series."
    columns:
      - name: series_id
        description: "ESPN series ID"
        tests:
          - unique
          - not_null
      - name: series_name
        description: "Series name (e.g. 'Indian Premier League')"
      - name: season
        description: "Season string from ESPN"
      - name: series_slug
        description: "URL slug for the series"

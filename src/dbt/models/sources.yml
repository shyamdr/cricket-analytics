version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: matches
        description: "Raw match metadata from Cricsheet JSON files"
        meta:
          dagster:
            asset_key: ["bronze_matches"]
      - name: deliveries
        description: "Raw ball-by-ball delivery data from Cricsheet JSON files"
        meta:
          dagster:
            asset_key: ["bronze_matches"]
      - name: people
        description: "Player/official registry from Cricsheet people.csv"
        meta:
          dagster:
            asset_key: ["bronze_people"]
      - name: espn_matches
        description: "ESPN match-level enrichment data (venue, timing, captains, home team, etc.)"
      - name: espn_players
        description: "ESPN player biographical data (DOB, batting/bowling styles, playing roles, overseas flag)"
      - name: espn_innings
        description: "ESPN innings-level data (partnerships, DRS reviews, phase breakdowns, fielding metrics)"
      - name: espn_ball_data
        description: "ESPN per-ball spatial data (wagon wheel, pitch line/length, shot type, win probability)"
      - name: venue_coordinates
        description: "Geocoded venue coordinates (lat/lng, formatted address) from geocoding enrichment job. Populated by the geocode_venues asset — new venues are detected from dim_venues and geocoded automatically."
        meta:
          dagster:
            asset_key: ["geocode_venue_coordinates"]
      - name: weather
        description: "Historical weather data from Open-Meteo API. One row per match with full hourly + daily JSON. Populated by the weather_enrichment Dagster asset."
        meta:
          dagster:
            asset_key: ["weather_enrichment"]

# -- Delta feeds ------------------------------------------------------------
# These are NOT selectable as datasets. They're used by the --recent flag
# and contain matches from ALL formats/genders. Enrichment follows the
# per-dataset config of whichever dataset each match belongs to.
delta_feeds:
  recent_7:
    url: https://cricsheet.org/downloads/recently_added_7_json.zip
    name: Recently Added (7 days)
  recent_30:
    url: https://cricsheet.org/downloads/recently_added_30_json.zip
    name: Recently Added (30 days)
  played_7:
    url: https://cricsheet.org/downloads/recently_played_7_json.zip
    name: Recently Played (7 days)
  played_30:
    url: https://cricsheet.org/downloads/recently_played_30_json.zip
    name: Recently Played (30 days)

# -- External enrichment sources --------------------------------------------
# Global pipelines that run across all ingested data.
# Controlled separately from per-dataset enrichment flags above.
enrichment_sources:
  weather:
    enabled: true
    provider: open-meteo
    description: "Historical weather (temp, humidity, wind, precipitation)"
    requires: geocoding
    api_key_required: false

  geocoding:
    enabled: true
    provider: openstreetmap-nominatim
    description: "Venue coordinates (lat/lng) from venue name"
    rate_limit: "1 req/sec"
    api_key_required: false

  auction:
    enabled: false
    provider: seed-csv
    description: "IPL auction prices — manual CSV (data/seeds/auction_prices.csv)"
    applies_to: [ipl]
    api_key_required: false

  player_dob:
    enabled: false
    provider: espncricinfo
    description: "Player date of birth from ESPN profiles"
    api_key_required: false

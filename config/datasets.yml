  # Club T20 Leagues
  # =========================================================================
  ipl:
    url: https://cricsheet.org/downloads/ipl_json.zip
    name: Indian Premier League
    enabled: true
    format: T20
    gender: male
    team_type: club
    enrichment:
      espn_match: true
      espn_ball: true
      weather: true
      geocoding: true


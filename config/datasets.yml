# ---------------------------------------------------------------------------
# Cricket Analytics — Dataset & Enrichment Configuration
#
# This file is the SINGLE SOURCE OF TRUTH for what data gets ingested
# and enriched. All consumers (CLI, Makefile, Dagster, Docker) read from here.
#
# To add a new league:
#   1. Add an entry under `datasets:` with the Cricsheet URL
#   2. Set enabled: true when ready to ingest
#
# To change what gets ingested by default:
#   - Edit the `default_profile` or modify a profile's dataset list
#   - Or just flip `enabled: true/false` on individual datasets
#
# URL slugs verified against https://cricsheet.org/downloads/ (March 2026)
# ---------------------------------------------------------------------------

# -- Ingestion profiles (named presets for common workflows) ----------------
profiles:
  minimal:
    datasets: [ipl]
    description: "IPL only — fast dev iteration"
  standard:
    datasets: [ipl, t20i]
    description: "IPL + T20 Internationals — default"
  t20_all:
    datasets: [ipl, t20i, bbl, psl, cpl, sa20, lpl, ilt20, bpl, npl, mlc, msl, ssm, ntb]
    description: "All T20 leagues + T20 internationals"
  everything:
    datasets: [ipl, t20i, bbl, psl, cpl, sa20, lpl, ilt20, bpl, npl, mlc, msl, ssm, ntb, odi, test, t20i_women, odi_women, test_women, wbbl, wpl]
    description: "Every available dataset"

default_profile: standard

# -- Dataset registry -------------------------------------------------------
# Each entry defines a Cricsheet dataset with its download URL and metadata.
#
# Fields:
#   url:        Cricsheet download URL (verified via HTTP HEAD)
#   name:       Human-readable name
#   enabled:    Whether `make ingest` includes this dataset
#   format:     T20 | ODI | Test (informational — used by UI/analytics)
#   gender:     male | female
#   team_type:  club | international
#   enrichment: Which enrichment pipelines apply to this dataset
#     espn_match:  Scrape match metadata (captain, keeper, roles, toss time)
#     espn_ball:   Scrape ball-by-ball commentary (wagon wheel, shot type)
#     weather:     Fetch historical weather from Open-Meteo
#     geocoding:   Resolve venue lat/lng from OpenStreetMap Nominatim

datasets:
